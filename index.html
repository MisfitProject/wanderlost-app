<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Strict mobile viewport: disables pinch zoom, forces device width -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Wanderløst | V3</title>
    
    <!-- External Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Core App Styles -->
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- App Container (Locks viewport to prevent bounce scroll effects) -->
    <div id="app-container">

        <!-- 1. Full-Screen Map Layer -->
        <div id="map-bg"></div>
        <div id="fog-overlay"></div>

        <!-- 2. The HUD / Status Bar (Top) -->
        <header id="hud-top">
            <div class="hud-brand">Wanderløst</div>
            <div class="hud-badges">
                <i class="fa-solid fa-compass locked"></i>
                <i class="fa-solid fa-key locked"></i>
                <i class="fa-solid fa-gem locked"></i>
            </div>
        </header>

        <!-- 3. Dynamic "Bottom Sheet" Location Card -->
        <section id="location-sheet" class="bottom-sheet hidden">
            <div class="sheet-drag-handle"></div>
            <div class="sheet-content">
                <div class="sheet-header">
                    <span class="tag">New Discovery</span>
                </div>
                <h2 id="loc-title">The Hidden Bakery</h2>
                <p id="loc-desc">A local favorite untouched by tourists. Find the hidden entrance behind the old brick wall.</p>
                
                <button id="btn-navigate" class="primary-btn">
                    <i class="fa-solid fa-location-arrow"></i> Navigate Here
                </button>
            </div>
        </section>

        <!-- 4. Scanning Indicator (Floating) -->
        <div id="scan-indicator" class="hidden">
            <i class="fa-solid fa-satellite-dish fa-spin"></i>
            <span id="scan-status-text">Scanning for secrets...</span>
        </div>

        <!-- 5. Fixed Bottom Navigation Bar -->
        <nav id="bottom-nav">
            <button class="nav-item" id="nav-profile">
                <i class="fa-regular fa-user"></i>
                <span>Dossier</span>
            </button>
            
            <button class="nav-item scan-btn" id="nav-scan">
                <i class="fa-solid fa-satellite-dish"></i>
            </button>
            
            <button class="nav-item" id="nav-map">
                <i class="fa-regular fa-map"></i>
                <span>Radar</span>
            </button>
        </nav>

        <!-- 6. Modals Container -->
        <div id="modal-container">
            <!-- Alert Modal -->
            <div id="alert-modal" class="modal-backdrop hidden">
                <div class="modal-card">
                    <div class="modal-icon"><i class="fa-solid fa-circle-info"></i></div>
                    <h3 id="alert-title">Notice</h3>
                    <p id="alert-message">System message.</p>
                    <div class="modal-actions">
                        <button id="alert-cancel-btn" class="secondary-btn hidden">Cancel</button>
                        <button id="alert-ok-btn" class="primary-btn">Acknowledge</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Google Maps Script (Callback to JS Module) -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=API_KEY_PLACEHOLDER&callback=initMapData"></script>
    
    <!-- Application Logic -->
    <script src="js/app.js" type="module"></script>
</body>
</html>
